<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Error | Stackly</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/error.css">

</head>

<body>

        <!--==================================
                BACKGROUND
    ===================================-->

    <div class="grid-bg"></div>

    <div class="blur blur-1"></div>

    <div class="blur blur-2"></div>

<section class="error-page">

    <div class="error-card">

        <div class="error-code">

            404

        </div>

        <h1>

            Page Not Found

        </h1>

        <p>

            Sorry, the page you're looking for doesn't exist,
            has been moved, or is currently unavailable.

        </p>

        <div class="buttons">

            <a href="index.html"
               class="btn-primary">

                Back to Home

            </a>

            <button
                class="btn-secondary"
                onclick="history.back()">

                Go Back

            </button>

        </div>

    </div>

</section>

</body>

</html>
